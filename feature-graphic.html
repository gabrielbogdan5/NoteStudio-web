<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1024px; height: 500px; overflow: hidden; background: #0f0a1e; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0618"/>
      <stop offset="50%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#130c28"/>
    </linearGradient>

    <!-- Purple glow left -->
    <radialGradient id="glowL" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b78fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#b78fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Teal glow right -->
    <radialGradient id="glowR" cx="82%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#64e0c8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#64e0c8" stop-opacity="0"/>
    </radialGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1540"/>
      <stop offset="100%" stop-color="#16102e"/>
    </linearGradient>

    <!-- Accent gradient for logo -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b78fff"/>
      <stop offset="100%" stop-color="#64e0c8"/>
    </linearGradient>

    <!-- Shimmer on card -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.07" stroke="#b78fff" stroke-width="0.5">
    <line x1="0" y1="83" x2="1024" y2="83"/>
    <line x1="0" y1="166" x2="1024" y2="166"/>
    <line x1="0" y1="249" x2="1024" y2="249"/>
    <line x1="0" y1="332" x2="1024" y2="332"/>
    <line x1="0" y1="415" x2="1024" y2="415"/>
    <line x1="128" y1="0" x2="128" y2="500"/>
    <line x1="256" y1="0" x2="256" y2="500"/>
    <line x1="384" y1="0" x2="384" y2="500"/>
    <line x1="512" y1="0" x2="512" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
    <line x1="768" y1="0" x2="768" y2="500"/>
    <line x1="896" y1="0" x2="896" y2="500"/>
  </g>

  <!-- Glow blobs -->
  <rect width="1024" height="500" fill="url(#glowL)"/>
  <rect width="1024" height="500" fill="url(#glowR)"/>

  <!-- ── LEFT SIDE — Text ── -->

  <!-- Tagline small -->
  <text x="80" y="168" font-family="'DM Sans', sans-serif" font-weight="400" font-size="12"
        fill="#b78fff" letter-spacing="3" opacity="0.9">NOTES APPLICATION</text>

  <!-- Main logo text -->
  <text x="78" y="240" font-family="'Playfair Display', serif" font-weight="700" font-size="72"
        fill="#f0ecf8">Note</text>
  <text x="78" y="315" font-family="'Playfair Display', serif" font-weight="400" font-size="72"
        fill="url(#accentGrad)">Studio</text>

  <!-- Subtitle -->
  <text x="80" y="358" font-family="'DM Sans', sans-serif" font-weight="300" font-size="15"
        fill="#a899cc" letter-spacing="0.3">Elegant notes · Themes · Export · Bilingual</text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="80" y="376" width="90" height="26" rx="13" fill="#1e1540" stroke="#2d2050" stroke-width="1"/>
  <text x="125" y="393" font-family="'DM Sans', sans-serif" font-size="11" fill="#b78fff"
        text-anchor="middle" font-weight="500">✦ Free</text>

  <!-- Pill 2 -->
  <rect x="180" y="376" width="106" height="26" rx="13" fill="#1e1540" stroke="#2d2050" stroke-width="1"/>
  <text x="233" y="393" font-family="'DM Sans', sans-serif" font-size="11" fill="#64e0c8"
        text-anchor="middle" font-weight="500">✦ Dark Mode</text>

  <!-- Pill 3 -->
  <rect x="296" y="376" width="96" height="26" rx="13" fill="#1e1540" stroke="#2d2050" stroke-width="1"/>
  <text x="344" y="393" font-family="'DM Sans', sans-serif" font-size="11" fill="#ffd166"
        text-anchor="middle" font-weight="500">✦ Auto-save</text>

  <!-- Divider vertical line -->
  <line x1="490" y1="60" x2="490" y2="440" stroke="#2d2050" stroke-width="1" opacity="0.6"/>

  <!-- ── RIGHT SIDE — Mock UI Card ── -->

  <!-- Phone frame shadow -->
  <rect x="538" y="40" width="260" height="420" rx="24" fill="#000" opacity="0.5"/>

  <!-- Phone frame -->
  <rect x="534" y="36" width="260" height="420" rx="24" fill="url(#cardGrad)" stroke="#2d2050" stroke-width="1.5"/>
  <rect x="534" y="36" width="260" height="420" rx="24" fill="url(#shimmer)"/>

  <!-- Phone notch -->
  <rect x="634" y="40" width="60" height="8" rx="4" fill="#0f0a1e"/>

  <!-- App topbar -->
  <rect x="534" y="60" width="260" height="38" fill="#1a1030"/>
  <text x="554" y="84" font-family="'Playfair Display', serif" font-size="13" fill="#f0ecf8" font-weight="600">Note<tspan fill="#b78fff">Studio</tspan></text>
  <!-- New note button -->
  <rect x="741" y="67" width="45" height="24" rx="7" fill="#b78fff"/>
  <text x="763" y="83" font-family="'DM Sans', sans-serif" font-size="11" fill="#1a0a2e" text-anchor="middle" font-weight="500">+ New</text>

  <!-- Divider -->
  <line x1="534" y1="98" x2="794" y2="98" stroke="#2d2050" stroke-width="1"/>

  <!-- Search bar -->
  <rect x="544" y="105" width="240" height="26" rx="8" fill="#0f0a1e" stroke="#2d2050" stroke-width="1"/>
  <text x="558" y="122" font-family="'DM Sans', sans-serif" font-size="10" fill="#6b5e8a">🔍  Search notes...</text>

  <!-- Note item 1 — active/selected -->
  <rect x="544" y="138" width="240" height="62" rx="10" fill="#251848" stroke="#b78fff" stroke-width="1" opacity="0.9"/>
  <circle cx="558" cy="155" r="5" fill="#b78fff"/>
  <text x="570" y="158" font-family="'DM Sans', sans-serif" font-size="11" fill="#f0ecf8" font-weight="500">Project ideas</text>
  <text x="570" y="173" font-family="'DM Sans', sans-serif" font-size="9.5" fill="#a899cc">Mobile app redesign...</text>
  <text x="784" y="193" font-family="'DM Sans', sans-serif" font-size="8.5" fill="#6b5e8a" text-anchor="end">today, 14:32</text>

  <!-- Note item 2 -->
  <rect x="544" y="207" width="240" height="62" rx="10" fill="#1a1030" stroke="#2d2050" stroke-width="1"/>
  <circle cx="558" cy="224" r="5" fill="#64e0c8"/>
  <text x="570" y="227" font-family="'DM Sans', sans-serif" font-size="11" fill="#f0ecf8" font-weight="500">Shopping list</text>
  <text x="570" y="242" font-family="'DM Sans', sans-serif" font-size="9.5" fill="#a899cc">Milk, bread, cheese...</text>
  <text x="784" y="262" font-family="'DM Sans', sans-serif" font-size="8.5" fill="#6b5e8a" text-anchor="end">yesterday</text>

  <!-- Note item 3 -->
  <rect x="544" y="276" width="240" height="62" rx="10" fill="#1a1030" stroke="#2d2050" stroke-width="1"/>
  <circle cx="558" cy="293" r="5" fill="#ffd166"/>
  <text x="570" y="296" font-family="'DM Sans', sans-serif" font-size="11" fill="#f0ecf8" font-weight="500">Journal — Monday</text>
  <text x="570" y="311" font-family="'DM Sans', sans-serif" font-size="9.5" fill="#a899cc">It was a good day, I...</text>
  <text x="784" y="331" font-family="'DM Sans', sans-serif" font-size="8.5" fill="#6b5e8a" text-anchor="end">Apr 23</text>

  <!-- Bottom bar mock -->
  <rect x="534" y="388" width="260" height="68" rx="0" fill="#1a1030"/>
  <rect x="534" y="388" width="260" height="68" rx="0" fill="#1a1030"/>
  <!-- bottom bar curve top -->
  <rect x="534" y="388" width="260" height="2" fill="#2d2050"/>

  <!-- Bottom icons -->
  <text x="566" y="420" font-family="'DM Sans', sans-serif" font-size="9" fill="#b78fff" text-anchor="middle">✏</text>
  <text x="566" y="432" font-family="'DM Sans', sans-serif" font-size="8" fill="#6b5e8a" text-anchor="middle">New</text>

  <text x="620" y="420" font-family="'DM Sans', sans-serif" font-size="9" fill="#a899cc" text-anchor="middle">💾</text>
  <text x="620" y="432" font-family="'DM Sans', sans-serif" font-size="8" fill="#6b5e8a" text-anchor="middle">Saved ✓</text>

  <text x="674" y="420" font-family="'DM Sans', sans-serif" font-size="9" fill="#a899cc" text-anchor="middle">↑</text>
  <text x="674" y="432" font-family="'DM Sans', sans-serif" font-size="8" fill="#6b5e8a" text-anchor="middle">Export</text>

  <text x="728" y="420" font-family="'DM Sans', sans-serif" font-size="9" fill="#ff6b6b" text-anchor="middle">🗑</text>
  <text x="728" y="432" font-family="'DM Sans', sans-serif" font-size="8" fill="#6b5e8a" text-anchor="middle">Delete</text>

  <text x="778" y="420" font-family="'DM Sans', sans-serif" font-size="9" fill="#a899cc" text-anchor="middle">☰</text>
  <text x="778" y="432" font-family="'DM Sans', sans-serif" font-size="8" fill="#6b5e8a" text-anchor="middle">Notes</text>

  <!-- Phone home bar -->
  <rect x="634" y="447" width="60" height="3" rx="2" fill="#2d2050"/>

  <!-- Decorative dots top-left -->
  <circle cx="32" cy="40" r="2" fill="#b78fff" opacity="0.4"/>
  <circle cx="48" cy="40" r="2" fill="#b78fff" opacity="0.25"/>
  <circle cx="32" cy="56" r="2" fill="#b78fff" opacity="0.25"/>
  <circle cx="48" cy="56" r="2" fill="#b78fff" opacity="0.15"/>

  <!-- Decorative dots bottom-right -->
  <circle cx="984" cy="460" r="2" fill="#64e0c8" opacity="0.4"/>
  <circle cx="968" cy="460" r="2" fill="#64e0c8" opacity="0.25"/>
  <circle cx="984" cy="444" r="2" fill="#64e0c8" opacity="0.25"/>
  <circle cx="968" cy="444" r="2" fill="#64e0c8" opacity="0.15"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1024" height="2" fill="url(#accentGrad)" opacity="0.6"/>
  <!-- Accent line bottom -->
  <rect x="0" y="498" width="1024" height="2" fill="url(#accentGrad)" opacity="0.4"/>

  <!-- Contact email -->
  <text x="512" y="490" font-family="'DM Sans', sans-serif" font-size="10" fill="#6b5e8a"
        text-anchor="middle" opacity="0.7">notestudiocontact@gmail.com</text>

</svg>
</body>
</html>
